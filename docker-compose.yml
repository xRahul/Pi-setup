x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:


  tailscale:
    image: tailscale/tailscale:v1.94.2
    container_name: tailscale
    restart: unless-stopped
    logging: *default-logging
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTH_KEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_HOSTNAME=pi-docker-ts
      - TS_ROUTES=10.8.1.0/24
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS}
    volumes:
      - ${TAILSCALE_PATH}:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
      - net.ipv4.conf.all.src_valid_mark=1
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    healthcheck:
      test: ["CMD", "tailscale", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      wg-easy:
        ipv4_address: 10.8.1.48



  pihole:
    image: pihole/pihole:2026.02.0
    container_name: pihole
    hostname: pihole
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - pihole.env
    environment:
      - FTLCONF_webserver_api_password=${PIHOLE__WEBPASSWORD}
      - TZ=${DEFAULT_TZ}
      - FTLCONF_dns_upstreams=10.8.1.4#5053
      - FTLCONF_dns_listeningMode=ALL
      - FTLCONF_log_query=false # Disable text log to save writes
    cap_add:
      - SYS_NICE
      - SYS_TIME
    healthcheck:
      test: ["CMD", "dig", "+short", "@127.0.0.1", "pi.hole", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ${PIHOLE_ETC_PATH}:/etc/pihole
      - ${PIHOLE_ETC_DNSMASQ_PATH}:/etc/dnsmasq.d
    # ports:
      # - "53:53/tcp"
      # - "53:53/udp"
      # - "5353:80/tcp"
    networks:
      wg-easy:
        ipv4_address: 10.8.1.3





  dnscrypt-proxy:
    image: klutchell/dnscrypt-proxy:2.1.15
    container_name: dnscrypt-proxy
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./dnscrypt-proxy/dnscrypt-proxy.toml:/config/dnscrypt-proxy.toml
    networks:
      wg-easy:
        ipv4_address: 10.8.1.4



  caddy:
    image: ghcr.io/caddybuilds/caddy-cloudflare:2.11.2
    container_name: caddy
    network_mode: service:tailscale
    user: 1000:1000 # should be owner of volumes
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - tailscale
    cap_add:
      - NET_ADMIN
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    # ports:
    #   - "80:80"
    #   - "443:443"
    #   - "443:443/udp"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CADDY_SITE_PATH}:/srv
      - ${CADDY_DATA_PATH}:/data
      - ${CADDY_CONFIG_PATH}:/config
      # - ${TAILSCALE_TMP_PATH}/tailscaled.sock:/var/run/tailscale/tailscaled.sock
    # networks:
    #   wg-easy:
    #     ipv4_address: 10.8.1.5

  paperless-ngx:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.13
    container_name: paperless-ngx
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - immich-redis
    # ports:
    #   - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - ${PAPERLESS_NGX_DATA_PATH}:/usr/src/paperless/data
      - ${PAPERLESS_NGX_MEDIA_PATH}:/usr/src/paperless/media
      - ${PAPERLESS_NGX_EXPORT_PATH}:/usr/src/paperless/export
      - ${PAPERLESS_NGX_CONSUME_PATH}:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://immich-redis:6379
      PAPERLESS_TIME_ZONE: ${DEFAULT_TZ}
      PAPERLESS_URL: ${PAPERLESS_NGX_URL}
      PAPERLESS_SECRET_KEY: ${PAPERLESS_NGX_SECRET_KEY}
    dns:
      - 10.8.1.3
      - 1.1.1.1
      - 8.8.8.8
    networks:
      wg-easy:
        ipv4_address: 10.8.1.32


  filebrowser:
    image: filebrowser/filebrowser:v2.62.1
    container_name: filebrowser
    logging: *default-logging
    volumes:
      - ${FILEBROWSER_ROOT_PATH}:/srv
      - ${FILEBROWSER_DB_FILE_PATH}:/database/filebrowser.db
      - ${FILEBROWSER_CONFIG_SETTING_FILE_PATH}:/config/settings.json
    environment:
      - PUID=1000
      - PGID=1000
      - FB_DATABASE=/database/filebrowser.db
      - FB_CONFIG=/config/settings.json
      - FB_ADDR=0.0.0.0
      - FB_PORT=80
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # ports:
    #   - 8080:80
    restart: unless-stopped
    dns:
      - 10.8.1.3
      - 1.1.1.1
      - 8.8.8.8
    networks:
      wg-easy:
        ipv4_address: 10.8.1.34



  transmission:
    image: lscr.io/linuxserver/transmission:4.1.1-r1-ls336
    container_name: transmission
    restart: unless-stopped
    logging: *default-logging
    # network_mode: "service:gluetun"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9091"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ${TRANSMISSION_CONFIG_SOURCE}:/config
      - ${TRANSMISSION_DOWNLOAD_SOURCE}:/downloads
      - ${TRANSMISSION_WATCH_SOURCE}:/watch
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=${DEFAULT_TZ}
      # - DOCKER_MODS=linuxserver/mods:transmission-floodui
      # - DOCKER_MODS=linuxserver/mods:transmission-transmissionic
      - USER=${TRANSMISSION_USERNAME}
      - PASS=${TRANSMISSION_PASSWORD}
    dns:
      - 10.8.1.3
      - 1.1.1.1
      - 8.8.8.8
    networks:
      wg-easy:
        ipv4_address: 10.8.1.23




  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:v2.6.3
    logging: *default-logging
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - ${EXTERNAL_LIBRARY_LOCATION}:/usr/src/app/external:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      - DB_HOSTNAME=immich_postgres
      - REDIS_HOSTNAME=immich_redis
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_USERNAME=${IMMICH_DB_USERNAME}
      - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:2283/api/server/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      - immich-redis
      - immich-database
    restart: always
    dns:
      - 10.8.1.3
      - 1.1.1.1
    networks:
      wg-easy:
        ipv4_address: 10.8.1.6

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:v2.6.3
    logging: *default-logging
    volumes:
      - ${IMMICH_ML_MODEL_CACHE_LOCATION}:/cache
      - ${EXTERNAL_LIBRARY_LOCATION}:/usr/src/app/external:ro
    env_file:
      - .env
    environment:
      - DB_HOSTNAME=immich_postgres
      - REDIS_HOSTNAME=immich_redis
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_USERNAME=${IMMICH_DB_USERNAME}
      - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME}
      - MACHINE_LEARNING_ACCELERATOR=cpu
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:3003/ping')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    dns:
      - 10.8.1.3
      - 1.1.1.1
    networks:
      wg-easy:
        ipv4_address: 10.8.1.8

  immich-redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:3eeb09785cd61ec8e3be35f8804c8892080f3ca21934d628abc24ee4ed1698f6
    logging: *default-logging
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    volumes:
      - ${IMMICH_REDIS_DATA_PATH}:/data
    networks:
      wg-easy:
        ipv4_address: 10.8.1.9

  immich-database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    logging: *default-logging
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USERNAME}
      POSTGRES_DB: ${IMMICH_DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IMMICH_DB_USERNAME} -d ${IMMICH_DB_DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${IMMICH_DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    networks:
      wg-easy:
        ipv4_address: 10.8.1.10

  homepage:
    image: ghcr.io/gethomepage/homepage:v1.11.0
    container_name: homepage
    restart: unless-stopped
    logging: *default-logging
    environment:
      - PUID=1000
      - PGID=985
      - HOMEPAGE_ALLOWED_HOSTS=homepage.pi.rahulja.in,dash.pi.rahulja.in
      - TZ=${DEFAULT_TZ}
    volumes:
      - ${HOMEPAGE_CONFIG_PATH}:/app/config
      - /var/run/docker.sock:/var/run/docker.sock # Optional, for docker integration
      - /mnt/usb:/storage:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    dns:
      - 10.8.1.3
      - 1.1.1.1
      - 8.8.8.8
    # ports:
    #   - 3000:3000
    networks:
      wg-easy:
        ipv4_address: 10.8.1.57

  stirling-pdf:
    image: stirlingtools/stirling-pdf:2.8.0
    container_name: stirling-pdf
    hostname: stirling-pdf
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ${STIRLING_PDF_DATA_PATH}/tessdata:/usr/share/tessdata
      - ${STIRLING_PDF_DATA_PATH}/configs:/configs
      - ${STIRLING_PDF_DATA_PATH}/logs:/logs
      - ${STIRLING_PDF_DATA_PATH}/pipeline:/pipeline
    environment:
      - PUID=1000
      - PGID=1000
      - SECURITY_ENABLELOGIN=false
      - LANGS=${STIRLING_PDF_LANGS:-en_GB}
      - DOCKER_ENABLE_SECURITY=false
      - TZ=${DEFAULT_TZ}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    dns:
      - 10.8.1.3
      - 1.1.1.1
    networks:
      wg-easy:
        ipv4_address: 10.8.1.58


# Booked 10.8.1.2 - 10.8.1.58 # remember to add to .env of local dns pihole

networks:
  wg-easy:
    driver: bridge
    ipam:
      config:
        - subnet: 10.8.1.0/24
