name: homelab

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:


  tailscale:
    image: tailscale/tailscale:v1.98.4
    container_name: tailscale
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache ethtool && ethtool -K eth0 rx-udp-gro-forwarding on rx-gro-list off || true
        exec /usr/local/bin/containerboot
    logging: *default-logging
    environment:
      - TZ=${DEFAULT_TZ}
      - TS_AUTHKEY=${TAILSCALE_AUTH_KEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_HOSTNAME=pi-docker-ts
      - TS_ROUTES=10.8.1.0/24
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS}
      - TS_DEBUG_FIREWALL_MODE=nftables
    volumes:
      - ${TAILSCALE_PATH}:/var/lib/tailscale
      - /lib/modules:/lib/modules:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
      - net.ipv4.conf.all.src_valid_mark=1
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    healthcheck:
      test: ["CMD-SHELL", "tailscale status && ip addr show dev tailscale0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      wg-easy:
        ipv4_address: 10.8.1.48

  pihole:
    image: pihole/pihole:2026.06.0
    network_mode: service:tailscale
    container_name: pihole
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - pihole.env
    environment:
      - FTLCONF_webserver_api_password=${PIHOLE__WEBPASSWORD}
      - TZ=${DEFAULT_TZ}
      - FTLCONF_dns_upstreams=127.0.0.1#5053
      - FTLCONF_dns_listeningMode=ALL
      - FTLCONF_dns_queryLogging=false
      - FTLCONF_webserver_port=8080
      - FTLCONF_files_database=/pihole-db/pihole-FTL.db
      - FTLCONF_misc_check_disk=0
    security_opt:
      - no-new-privileges:true
    cap_add:
      - SYS_NICE
      - SYS_TIME
    healthcheck:
      test: ["CMD", "dig", "+short", "@127.0.0.1", "pi.hole", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ${PIHOLE_ETC_PATH}:/etc/pihole
      - ${PIHOLE_ETC_DNSMASQ_PATH}:/etc/dnsmasq.d
      - ./pihole-db:/pihole-db
    depends_on:
      - tailscale
  dnscrypt-proxy:
    cap_drop:
      - ALL
    user: "1000:1000"
    image: klutchell/dnscrypt-proxy:2.1.16
    network_mode: service:tailscale
    container_name: dnscrypt-proxy
    restart: unless-stopped
    environment:
      - TZ=${DEFAULT_TZ}
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./dnscrypt-proxy/dnscrypt-proxy.toml:/config/dnscrypt-proxy.toml
    depends_on:
      - tailscale
  caddy:
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
      - DAC_OVERRIDE
    cap_drop:
      - ALL
    build:
      context: .
      dockerfile: caddy.Dockerfile
    container_name: caddy
    network_mode: service:tailscale
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - tailscale
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${DEFAULT_TZ}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    # ports:
    #   - "80:80"
    #   - "443:443"
    #   - "443:443/udp"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CADDY_SITE_PATH}:/srv
      - ${CADDY_DATA_PATH}:/data
      - ${CADDY_CONFIG_PATH}:/config
      # - ${TAILSCALE_TMP_PATH}/tailscaled.sock:/var/run/tailscale/tailscaled.sock
    # networks:
    #   wg-easy:
    #     ipv4_address: 10.8.1.5


  filebrowser:
    cap_drop:
      - ALL
    user: "1000:1000"
    image: filebrowser/filebrowser:v2.63.17
    container_name: filebrowser
    labels:
      - "sablier.enable=true"
      - "sablier.group=filebrowser"
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${FILEBROWSER_ROOT_PATH}:/srv
      - ${FILEBROWSER_DB_FILE_PATH}:/database/filebrowser.db
      - ${FILEBROWSER_CONFIG_SETTING_FILE_PATH}:/config/settings.json
    environment:
      - TZ=${DEFAULT_TZ}
      - PUID=1000
      - PGID=1000
      - FB_DATABASE=/database/filebrowser.db
      - FB_CONFIG=/config/settings.json
      - FB_ADDR=0.0.0.0
      - FB_PORT=80
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # ports:
    #   - 8080:80
    restart: unless-stopped
    dns:
      - 10.8.1.48
      - 1.1.1.1
      - 8.8.8.8
    networks:
      wg-easy:
        ipv4_address: 10.8.1.34



  transmission:
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    cap_drop:
      - ALL
    image: lscr.io/linuxserver/transmission:4.1.3-r0-ls352
    container_name: transmission
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    # network_mode: "service:gluetun"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9091"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ${TRANSMISSION_CONFIG_SOURCE}:/config
      - ${TRANSMISSION_DOWNLOAD_SOURCE}:/downloads
      - ${TRANSMISSION_WATCH_SOURCE}:/watch
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=${DEFAULT_TZ}
      # - DOCKER_MODS=linuxserver/mods:transmission-floodui
      # - DOCKER_MODS=linuxserver/mods:transmission-transmissionic
      - USER=${TRANSMISSION_USERNAME}
      - PASS=${TRANSMISSION_PASSWORD}
    dns:
      - 10.8.1.48
      - 1.1.1.1
      - 8.8.8.8
    networks:
      wg-easy:
        ipv4_address: 10.8.1.23




  immich-redis:
    cap_drop:
      - ALL
    user: "999:999"
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${DEFAULT_TZ}
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    volumes:
      - ${IMMICH_REDIS_DATA_PATH}:/data
    networks:
      wg-easy:
        ipv4_address: 10.8.1.9

  homepage:
    cap_drop:
      - ALL
    user: "1000:1000"
    image: ghcr.io/gethomepage/homepage:v1.13.2
    container_name: homepage
    depends_on:
      - socket-proxy-read
    labels:
      - "sablier.enable=true"
      - "sablier.group=homepage"
    extra_hosts:
      - "dash.pi.rahulja.in:10.8.1.48"
      - "pihole.pi.rahulja.in:10.8.1.48"
      - "immich.pi.rahulja.in:10.8.1.48"
      - "homepage.pi.rahulja.in:10.8.1.48"
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      - PUID=1000
      - PGID=985
      - HOMEPAGE_ALLOWED_HOSTS=homepage.pi.rahulja.in,dash.pi.rahulja.in
      - TZ=${DEFAULT_TZ}
    volumes:
      - ${HOMEPAGE_CONFIG_PATH}:/app/config
      - /mnt/usb:/storage:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    dns:
      - 10.8.1.48
      - 1.1.1.1
      - 8.8.8.8
    # ports:
    #   - 3000:3000
    networks:
      wg-easy:
        ipv4_address: 10.8.1.57
      read-proxy-net:

  firefly:
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    cap_drop:
      - ALL
    image: fireflyiii/core:version-6.6.6
    hostname: firefly
    container_name: firefly
    labels:
      - "sablier.enable=true"
      - "sablier.group=firefly"
    restart: always
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${FIREFLY_UPLOAD_PATH}:/var/www/html/storage/upload
      - ${FIREFLY_DB_PATH}:/var/www/html/storage/database
    environment:
      - SITE_OWNER=me@rahulja.in
      - TRUSTED_PROXIES=**
      - AUDIT_LOG_LEVEL=emergency
      - DB_CONNECTION=sqlite
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=immich-redis
      - REDIS_PORT=6379
      - ENABLE_EXCHANGE_RATES=true
      - ENABLE_EXTERNAL_RATES=true
      - APP_URL=https://firefly.pi.rahulja.in
      - APP_KEY=${FIREFLY_APP_KEY}
      - STATIC_CRON_TOKEN=${FIREFLY_STATIC_CRON_TOKEN}
      - TZ=${DEFAULT_TZ}
    depends_on:
      - immich-redis
    dns:
      - 10.8.1.48
      - 1.1.1.1
      - 8.8.8.8
    networks:
      wg-easy:
        ipv4_address: 10.8.1.43

  firefly-importer:
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    cap_drop:
      - ALL
    image: fireflyiii/data-importer:version-2.3.3
    hostname: firefly-importer
    container_name: firefly-importer
    labels:
      - "sablier.enable=true"
      - "sablier.group=firefly"
    restart: always
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    depends_on:
      - firefly
      - immich-redis
    environment:
      - FIREFLY_III_URL=http://firefly:8080
      - VANITY_URL=https://firefly.pi.rahulja.in
      - LOG_LEVEL=info
      - TRUSTED_PROXIES=**
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=immich-redis
      - REDIS_PORT=6379
      - TZ=${DEFAULT_TZ}
    dns:
      - 10.8.1.48
      - 1.1.1.1
      - 8.8.8.8
    networks:
      wg-easy:
        ipv4_address: 10.8.1.44

  firefly-cron:
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    cap_drop:
      - ALL
    image: alpine:3.18
    container_name: firefly-cron
    restart: always
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    depends_on:
      - firefly
    environment:
      - TZ=${DEFAULT_TZ}
      - STATIC_CRON_TOKEN=${FIREFLY_STATIC_CRON_TOKEN}
    command: ["sh", "-c", "apk add --no-cache tzdata && \
      (ln -s /usr/share/zoneinfo/$$TZ /etc/localtime || true) && \
      echo \"0 3 * * * wget -qO- --no-check-certificate https://firefly.pi.rahulja.in/api/v1/cron/$$STATIC_CRON_TOKEN;echo\" \
      | crontab - && \
      crond -f -L /dev/stdout"]
    dns:
      - 10.8.1.48
      - 1.1.1.1
    networks:
      wg-easy:
        ipv4_address: 10.8.1.45


  portainer:
    cap_drop:
      - ALL
    user: "1000:1000"
    image: portainer/portainer-ce:2.39.4
    container_name: portainer
    depends_on:
      - socket-proxy-admin
    hostname: portainer
    command: -H tcp://socket-proxy-admin:2375
    labels:
      - "sablier.enable=true"
      - "sablier.group=portainer"
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${DEFAULT_TZ}
    volumes:
      - ${PORTAINER_DATA_PATH}:/data
    networks:
      wg-easy:
        ipv4_address: 10.8.1.59
      portainer-proxy-net:

  immich-server:
    cap_drop:
      - ALL
    user: "1000:1000"
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:v3.0.1
    labels:
      - "sablier.enable=true"
      - "sablier.group=immich"
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - ${EXTERNAL_LIBRARY_LOCATION}:/usr/src/app/external:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      - TZ=${DEFAULT_TZ}
      - DB_HOSTNAME=immich-database
      - REDIS_HOSTNAME=immich-redis
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_USERNAME=${IMMICH_DB_USERNAME}
      - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:2283/api/server/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      - immich-redis
      - immich-database
    restart: always
    dns:
      - 10.8.1.48
      - 1.1.1.1
    networks:
      wg-easy:
        ipv4_address: 10.8.1.6

  immich-machine-learning:
    cap_drop:
      - ALL
    user: "1000:1000"
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:v3.0.1
    labels:
      - "sablier.enable=true"
      - "sablier.group=immich"
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${IMMICH_ML_MODEL_CACHE_LOCATION}:/cache
      - ${EXTERNAL_LIBRARY_LOCATION}:/usr/src/app/external:ro
    env_file:
      - .env
    environment:
      - TZ=${DEFAULT_TZ}
      - DB_HOSTNAME=immich-database
      - REDIS_HOSTNAME=immich-redis
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_USERNAME=${IMMICH_DB_USERNAME}
      - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME}
      - MACHINE_LEARNING_ACCELERATOR=cpu
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:3003/ping')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: always
    dns:
      - 10.8.1.48
      - 1.1.1.1
    networks:
      wg-easy:
        ipv4_address: 10.8.1.8

  immich-database:
    cap_drop:
      - ALL
    user: "999:999"
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    labels:
      - "sablier.enable=true"
      - "sablier.group=immich"
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${DEFAULT_TZ}
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_USER=${IMMICH_DB_USERNAME}
      - POSTGRES_DB=${IMMICH_DB_DATABASE_NAME}
      - POSTGRES_INITDB_ARGS=--data-checksums
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IMMICH_DB_USERNAME} -d ${IMMICH_DB_DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${IMMICH_DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    networks:
      wg-easy:
        ipv4_address: 10.8.1.10

  stirling-pdf:
    cap_drop:
      - ALL
    image: stirlingtools/stirling-pdf:2.14.0-ultra-lite
    container_name: stirling-pdf
    labels:
      - "sablier.enable=true"
      - "sablier.group=stirling-pdf"
    hostname: stirling-pdf
    restart: unless-stopped
    mem_limit: 512m
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${STIRLING_PDF_DATA_PATH}/tessdata:/usr/share/tessdata
      - ${STIRLING_PDF_DATA_PATH}/configs:/configs
      - ${STIRLING_PDF_DATA_PATH}/logs:/logs
      - ${STIRLING_PDF_DATA_PATH}/pipeline:/pipeline
    environment:
      - PUID=1000
      - PGID=1000
      - SECURITY_ENABLELOGIN=false
      - LANGS=${STIRLING_PDF_LANGS:-en_GB}
      - DOCKER_ENABLE_SECURITY=false
      - TZ=${DEFAULT_TZ}
      - SPRINGDOC_API_DOCS_ENABLED=false
      - SPRINGDOC_SWAGGER_UI_ENABLED=false
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    dns:
      - 10.8.1.48
      - 1.1.1.1
    networks:
      wg-easy:
        ipv4_address: 10.8.1.58

  sablier:
    cap_drop:
      - ALL
    user: "1000:1000"
    image: sablierapp/sablier:1.14.0
    container_name: sablier
    depends_on:
      - socket-proxy-read
    restart: unless-stopped
    command:
      - start
      - --provider.name=docker
      - --provider.auto-stop-externally-started
    environment:
      - TZ=${DEFAULT_TZ}
      - DOCKER_HOST=tcp://socket-proxy-read:2375
    networks:
      wg-easy:
        ipv4_address: 10.8.1.60
      read-proxy-net:
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  socket-proxy-read:
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    cap_drop:
      - ALL
    image: lscr.io/linuxserver/socket-proxy:3.4.1-r0-ls87
    container_name: socket-proxy-read
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /run
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${DEFAULT_TZ}
      - POST=0
      - CONTAINERS=1
      - ALLOW_START=1
      - ALLOW_STOP=1
      - PING=1
      - VERSION=1
    networks:
      - read-proxy-net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  socket-proxy-admin:
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    cap_drop:
      - ALL
    image: lscr.io/linuxserver/socket-proxy:3.4.1-r0-ls87
    container_name: socket-proxy-admin
    labels:
      - "sablier.enable=true"
      - "sablier.group=portainer"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /run
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=${DEFAULT_TZ}
      - POST=1
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - EXEC=1
      - INFO=1
      - SYSTEM=1
      - ALLOW_START=1
      - ALLOW_STOP=1
      - ALLOW_RESTARTS=1
      - ALLOW_PAUSE=1
      - ALLOW_UNPAUSE=1
      - PING=1
      - VERSION=1
    networks:
      - portainer-proxy-net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${DEFAULT_TZ}
      - JELLYFIN_PublishedServerUrl=https://jellyfin.pi.rahulja.in
    devices:
      - /dev/dri:/dev/dri
      - /dev/video19:/dev/video19
      - /dev/media0:/dev/media0
    group_add:
      - "44"
      - "992"
    # --- NETWORK TOGGLE ---
    # Host Mode (Required for local DLNA multicast & direct Tailscale device access)
    network_mode: "host"
    
    # Bridge Mode (To revert, comment "network_mode" above and uncomment the configurations below)
    # ports:
    #   - 8096:8096
    #   - 7359:7359/udp
    #   - 1900:1900/udp
    # dns:
    #   - 10.8.1.48
    #   - 1.1.1.1
    # networks:
    #   wg-easy:
    #     ipv4_address: 10.8.1.16
    # ----------------------

    volumes:
      - ${JELLYFIN_CONFIG_LOCATION}:/config
      - ${JELLYFIN_CACHE_LOCATION}:/cache
      - ${JELLYFIN_TRANSMISSION_COMPLETE_LOCATION}:/data/downloads:ro
      - ${JELLYFIN_MUSIC_LOCAL_LOCATION}:/data/music_local:ro
      - ${JELLYFIN_MUSIC_USB_LOCATION}:/data/music_usb:ro

# Booked 10.8.1.2 - 10.8.1.60 # remember to add to .env of local dns pihole


networks:
  wg-easy:
    name: wg-easy
    driver: bridge
    ipam:
      config:
        - subnet: 10.8.1.0/24
  read-proxy-net:
    driver: bridge
    internal: true
  portainer-proxy-net:
    driver: bridge
    internal: true
