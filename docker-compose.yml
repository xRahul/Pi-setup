name: homelab

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:


  tailscale:
    image: tailscale/tailscale:v1.98.9
    container_name: tailscale
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache ethtool && ethtool -K eth0 rx-udp-gro-forwarding on rx-gro-list off || true
        exec /usr/local/bin/containerboot
    logging: *default-logging
    environment:
      - TZ=${DEFAULT_TZ}
      - TS_AUTHKEY=${TAILSCALE_AUTH_KEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_HOSTNAME=pi-docker-ts
      - TS_ROUTES=10.8.1.0/24
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS}
      - TS_DEBUG_FIREWALL_MODE=nftables
    volumes:
      - ${TAILSCALE_PATH}:/var/lib/tailscale
      - /lib/modules:/lib/modules:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
      - net.ipv4.conf.all.src_valid_mark=1
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    healthcheck:
      test: ["CMD-SHELL", "tailscale status && ip addr show dev tailscale0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      wg-easy:
        ipv4_address: 10.8.1.48

  pihole:
    image: pihole/pihole:2026.07.2
    network_mode: service:tailscale
    container_name: pihole
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - pihole.env
    environment:
      - FTLCONF_webserver_api_password=${PIHOLE__WEBPASSWORD}
      - TZ=${DEFAULT_TZ}
      - FTLCONF_dns_upstreams=127.0.0.1#5053
      - FTLCONF_dns_listeningMode=ALL
      - FTLCONF_dns_queryLogging=false
      - FTLCONF_webserver_port=8080
      - FTLCONF_files_database=/pihole-db/pihole-FTL.db
      - FTLCONF_misc_check_disk=0
    security_opt:
      - no-new-privileges:true
    cap_add:
      - SYS_NICE
      - SYS_TIME
    healthcheck:
      test: ["CMD", "dig", "+short", "@127.0.0.1", "pi.hole", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ${PIHOLE_ETC_PATH}:/etc/pihole
      - ${PIHOLE_ETC_DNSMASQ_PATH}:/etc/dnsmasq.d
      - ./pihole-db:/pihole-db
    depends_on:
      - tailscale
  dnscrypt-proxy:
    cap_drop:
      - ALL
    user: "1000:1000"
    image: klutchell/dnscrypt-proxy:2.1.16
    network_mode: service:tailscale
    container_name: dnscrypt-proxy
    restart: unless-stopped
    logging: *default-logging
    environment:
      - TZ=${DEFAULT_TZ}
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./dnscrypt-proxy:/config
    depends_on:
      - tailscale
  caddy:
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
      - DAC_OVERRIDE
    cap_drop:
      - ALL
    build:
      context: .
      dockerfile: caddy.Dockerfile
    container_name: caddy
    network_mode: service:tailscale
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - tailscale
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${DEFAULT_TZ}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    # ports:
    #   - "80:80"
    #   - "443:443"
    #   - "443:443/udp"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CADDY_SITE_PATH}:/srv
      - ${CADDY_DATA_PATH}:/data
      - ${CADDY_CONFIG_PATH}:/config
      # - ${TAILSCALE_TMP_PATH}/tailscaled.sock:/var/run/tailscale/tailscaled.sock
    # networks:
    #   wg-easy:
    #     ipv4_address: 10.8.1.5


  filebrowser:
    profiles:
      - lazy
    cap_drop:
      - ALL
    user: "1000:1000"
    image: filebrowser/filebrowser:v2.63.18
    container_name: filebrowser
    labels:
      - "sablier.enable=true"
      - "sablier.group=filebrowser"
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${FILEBROWSER_ROOT_PATH}:/srv
      - ${FIREFOX_DOWNLOADS_PATH}:/srv/firefox-downloads
      - ${FILEBROWSER_DB_FILE_PATH}:/database/filebrowser.db
      - ${FILEBROWSER_CONFIG_SETTING_FILE_PATH}:/config/settings.json
    environment:
      - TZ=${DEFAULT_TZ}
      - PUID=1000
      - PGID=1000
      - FB_DATABASE=/database/filebrowser.db
      - FB_CONFIG=/config/settings.json
      - FB_ADDR=0.0.0.0
      - FB_PORT=80
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # ports:
    #   - 8080:80
    restart: unless-stopped
    dns:
      - 10.8.1.48
      - 1.1.1.1
      - 8.8.8.8
    networks:
      wg-easy:
        ipv4_address: 10.8.1.34



  transmission:
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    cap_drop:
      - ALL
    image: lscr.io/linuxserver/transmission:4.1.3-r0-ls352
    container_name: transmission
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    # network_mode: "service:gluetun"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9091"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ${TRANSMISSION_CONFIG_SOURCE}:/config
      - ${TRANSMISSION_DOWNLOAD_SOURCE}:/downloads
      - ${TRANSMISSION_WATCH_SOURCE}:/watch
    environment:
      - PGID=1000
      - PUID=1000
      - TZ=${DEFAULT_TZ}
      # - DOCKER_MODS=linuxserver/mods:transmission-floodui
      # - DOCKER_MODS=linuxserver/mods:transmission-transmissionic
      - USER=${TRANSMISSION_USERNAME}
      - PASS=${TRANSMISSION_PASSWORD}
    dns:
      - 10.8.1.48
      - 1.1.1.1
      - 8.8.8.8
    networks:
      wg-easy:
        ipv4_address: 10.8.1.23




  immich-redis:
    profiles:
      - lazy
    cap_drop:
      - ALL
    user: "999:999"
    container_name: immich_redis
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    labels:
      - "sablier.enable=true"
      - "sablier.group=immich"
      - "sablier.ready-on-start=true"
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${DEFAULT_TZ}
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    volumes:
      - ${IMMICH_REDIS_DATA_PATH}:/data
    networks:
      wg-easy:
        ipv4_address: 10.8.1.9

  homepage:
    cap_drop:
      - ALL
    user: "1000:1000"
    image: ghcr.io/gethomepage/homepage:v1.13.2
    container_name: homepage
    depends_on:
      - socket-proxy-read
    extra_hosts:
      - "dash.pi.rahulja.in:10.8.1.48"
      - "pihole.pi.rahulja.in:10.8.1.48"
      - "immich.pi.rahulja.in:10.8.1.48"
      - "homepage.pi.rahulja.in:10.8.1.48"
      - "sure.pi.rahulja.in:10.8.1.48"
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      - PUID=1000
      - PGID=985
      - HOMEPAGE_ALLOWED_HOSTS=homepage.pi.rahulja.in,dash.pi.rahulja.in
      - TZ=${DEFAULT_TZ}
    volumes:
      - ${HOMEPAGE_CONFIG_PATH}:/app/config
      - /mnt/usb:/storage:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    dns:
      - 10.8.1.48
      - 1.1.1.1
      - 8.8.8.8
    # ports:
    #   - 3000:3000
    networks:
      wg-easy:
        ipv4_address: 10.8.1.57
      read-proxy-net:

  n8n:
    cap_drop:
      - ALL
    image: n8nio/n8n:2.31.3
    container_name: n8n
    restart: unless-stopped
    mem_limit: 768m
    mem_reservation: 256m
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${DEFAULT_TZ}
      - GENERIC_TIMEZONE=${DEFAULT_TZ}
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_HOST=n8n.pi.rahulja.in
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.pi.rahulja.in/
      - N8N_EDITOR_BASE_URL=https://n8n.pi.rahulja.in
      - N8N_PROXY_HOPS=1
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - EXECUTIONS_MODE=regular
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_MAX_CONCURRENCY=2
      - N8N_RUNNERS_MAX_OLD_SPACE_SIZE=128
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=2
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_MIGRATE_FS_STORAGE_PATH=true
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_PROGRESS=false
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=false
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - EXECUTIONS_DATA_PRUNE_MAX_COUNT=5000
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_TEMPLATES_ENABLED=false
      - EXTERNAL_FRONTEND_HOOKS_URLS=
      - N8N_DIAGNOSTICS_CONFIG_FRONTEND=
      - N8N_DIAGNOSTICS_CONFIG_BACKEND=
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_HIRING_BANNER_ENABLED=false
      - N8N_LOG_LEVEL=warn
      - NODE_OPTIONS=--max-old-space-size=512
    volumes:
      - ${N8N_DATA_FOLDER}:/home/node/.n8n
      - ${N8N_LOCAL_FILES_FOLDER}/files:/files
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const req=http.request('http://127.0.0.1:5678/healthz',{timeout:3000},res=>process.exit(res.statusCode>=200&&res.statusCode<400?0:1));req.on('error',()=>process.exit(1));req.end();"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    dns:
      - 10.8.1.48
      - 1.1.1.1
      - 8.8.8.8
    networks:
      wg-easy:
        ipv4_address: 10.8.1.53

  n8n-runners:
    cap_drop:
      - ALL
    image: n8nio/runners:2.31.3
    container_name: n8n-runners
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 64m
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    depends_on:
      n8n:
        condition: service_healthy
    environment:
      - TZ=${DEFAULT_TZ}
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTO_SHUTDOWN_TIMEOUT=15
      - N8N_RUNNERS_MAX_CONCURRENCY=2
      - N8N_RUNNERS_MAX_OLD_SPACE_SIZE=128
      - N8N_RUNNERS_LAUNCHER_LOG_LEVEL=warn
    dns:
      - 10.8.1.48
      - 1.1.1.1
      - 8.8.8.8
    networks:
      wg-easy:
        ipv4_address: 10.8.1.20

  firefly:
    profiles:
      - lazy
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - DAC_OVERRIDE
    cap_drop:
      - ALL
    image: fireflyiii/core:version-6.6.6
    hostname: firefly
    container_name: firefly
    labels:
      - "sablier.enable=true"
      - "sablier.group=firefly,firefly-importer"
      - "sablier.running-hours=02:30-04:30"
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ${FIREFLY_UPLOAD_PATH}:/var/www/html/storage/upload
      - ${FIREFLY_DB_PATH}:/var/www/html/storage/database
    environment:
      - SITE_OWNER=me@rahulja.in
      - TRUSTED_PROXIES=**
      - AUDIT_LOG_LEVEL=emergency
      - DB_CONNECTION=sqlite
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=firefly-redis
      - REDIS_PORT=6379
      - ENABLE_EXCHANGE_RATES=true
      - ENABLE_EXTERNAL_RATES=true
      - APP_URL=https://firefly.pi.rahulja.in
      - APP_KEY=${FIREFLY_APP_KEY}
      - STATIC_CRON_TOKEN=${FIREFLY_STATIC_CRON_TOKEN}
      - TZ=${DEFAULT_TZ}
    depends_on:
      firefly-redis:
        condition: service_healthy
    dns:
      - 10.8.1.48
      - 1.1.1.1
      - 8.8.8.8
    networks:
      wg-easy:
        ipv4_address: 10.8.1.43

  ghostfolio:
    profiles:
      - lazy
    image: ghostfolio/ghostfolio:3.28.0
    container_name: ghostfolio
    init: true
    restart: unless-stopped
    labels:
      - "sablier.enable=true"
      - "sablier.group=ghostfolio"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    environment:
      - DATABASE_URL=${GHOSTFOLIO_DATABASE_URL}
      - DIRECT_URL=${GHOSTFOLIO_DIRECT_URL}
      - ACCESS_TOKEN_SALT=${GHOSTFOLIO_ACCESS_TOKEN_SALT}
      - JWT_SECRET_KEY=${GHOSTFOLIO_JWT_SECRET_KEY}
      - ROOT_URL=${GHOSTFOLIO_ROOT_URL}
      - API_KEY_COINGECKO_DEMO=${GHOSTFOLIO_API_KEY_COINGECKO_DEMO}
      - REDIS_HOST=${GHOSTFOLIO_REDIS_HOST}
      - REDIS_PORT=${GHOSTFOLIO_REDIS_PORT}
      - REDIS_DB=${GHOSTFOLIO_REDIS_DB}
      - TZ=${DEFAULT_TZ}
    depends_on:
      ghostfolio-db:
        condition: service_healthy
      ghostfolio-valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3333/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    dns:
      - 10.8.1.48
      - 1.1.1.1
      - 8.8.8.8
    networks:
      wg-easy:
        ipv4_address: 10.8.1.4

  ghostfolio-db:
    profiles:
      - lazy
    image: postgres:18.4-alpine3.24
    container_name: ghostfolio-db
    restart: unless-stopped
    labels:
      - "sablier.enable=true"
      - "sablier.group=ghostfolio"
      - "sablier.ready-on-start=true"
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    environment:
      - TZ=${DEFAULT_TZ}
      - POSTGRES_USER=${GHOSTFOLIO_POSTGRES_USER}
      - POSTGRES_PASSWORD=${GHOSTFOLIO_POSTGRES_PASSWORD}
      - POSTGRES_DB=${GHOSTFOLIO_POSTGRES_DB}
    volumes:
      - ${GHOSTFOLIO_DB_DATA_PATH}:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GHOSTFOLIO_POSTGRES_USER} -d ${GHOSTFOLIO_POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      wg-easy:
        ipv4_address: 10.8.1.7

  ghostfolio-valkey:
    profiles:
      - lazy
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    container_name: ghostfolio-valkey
    restart: unless-stopped
    labels:
      - "sablier.enable=true"
      - "sablier.group=ghostfolio"
      - "sablier.ready-on-start=true"
    cap_drop:
      - ALL
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    environment:
      - TZ=${DEFAULT_TZ}
    volumes:
      - ${GHOSTFOLIO_VALKEY_DATA_PATH}:/data
    networks:
      wg-easy:
        ipv4_address: 10.8.1.11
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  firefly-importer:
    profiles:
      - lazy
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    cap_drop:
      - ALL
    image: fireflyiii/data-importer:version-2.3.3
    hostname: firefly-importer
    container_name: firefly-importer
    labels:
      - "sablier.enable=true"
      - "sablier.group=firefly-importer"
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      firefly:
        condition: service_healthy
      firefly-redis:
        condition: service_healthy
    environment:
      - FIREFLY_III_URL=http://firefly:8080
      - VANITY_URL=https://firefly.pi.rahulja.in
      - LOG_LEVEL=info
      - TRUSTED_PROXIES=**
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=firefly-redis
      - REDIS_PORT=6379
      - TZ=${DEFAULT_TZ}
    dns:
      - 10.8.1.48
      - 1.1.1.1
      - 8.8.8.8
    networks:
      wg-easy:
        ipv4_address: 10.8.1.44

  firefly-cron:
    profiles:
      - lazy
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    cap_drop:
      - ALL
    image: alpine:3.24.1
    container_name: firefly-cron
    labels:
      - "sablier.enable=true"
      - "sablier.group=firefly-cron"
      - "sablier.running-hours=02:30-04:30"
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    depends_on:
      - firefly
    environment:
      - TZ=${DEFAULT_TZ}
      - STATIC_CRON_TOKEN=${FIREFLY_STATIC_CRON_TOKEN}
    command: ["sh", "-c", "apk add --no-cache tzdata && \
      (ln -s /usr/share/zoneinfo/$$TZ /etc/localtime || true) && \
      echo \"0 3 * * * wget -qO- --no-check-certificate https://firefly.pi.rahulja.in/api/v1/cron/$$STATIC_CRON_TOKEN;echo\" \
      | crontab - && \
      crond -f -L /dev/stdout"]
    dns:
      - 10.8.1.48
      - 1.1.1.1
    networks:
      wg-easy:
        ipv4_address: 10.8.1.45
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3


  portainer:
    profiles:
      - lazy
    cap_drop:
      - ALL
    user: "1000:1000"
    # Use LTS tag, not STS.
    image: portainer/portainer-ce:2.43.0
    container_name: portainer
    depends_on:
      - socket-proxy-admin
    hostname: portainer
    command: -H tcp://socket-proxy-admin:2375
    labels:
      - "sablier.enable=true"
      - "sablier.group=portainer"
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=${DEFAULT_TZ}
    volumes:
      - ${PORTAINER_DATA_PATH}:/data
    networks:
      wg-easy:
        ipv4_address: 10.8.1.59
      portainer-proxy-net:

  immich-server:
    profiles:
      - lazy
    cap_drop:
      - ALL
    user: "1000:1000"
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:v3.0.3
    labels:
      - "sablier.enable=true"
      - "sablier.group=immich"
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - ${EXTERNAL_LIBRARY_LOCATION}:/usr/src/app/external:ro
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      - TZ=${DEFAULT_TZ}
      - DB_HOSTNAME=immich-database
      - REDIS_HOSTNAME=immich-redis
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_USERNAME=${IMMICH_DB_USERNAME}
